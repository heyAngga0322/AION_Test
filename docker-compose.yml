services:
  backend:
    build: 
      context: ./backend
    container_name: qa_engine_backend
    ports:
      - "8000:8000"
    volumes:
      - ./app_data:/app/app_data
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build: 
      context: ./frontend
    container_name: qa_engine_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
