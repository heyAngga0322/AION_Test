<div class="min-h-screen bg-slate-900 text-slate-100 font-sans p-6">
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">

    <!-- Upload Section -->
    <div
      class="md:col-span-1 bg-slate-800/50 backdrop-blur-md rounded-2xl p-6 border border-slate-700 shadow-xl self-start">
      <h2 class="text-2xl font-semibold mb-6 flex items-center text-indigo-400">
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
        </svg>
        Knowledge Base
      </h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Document Title</label>
          <input type="text" [ngModel]="uploadTitle()" (ngModelChange)="uploadTitle.set($event)"
            placeholder="e.g. Employee Handbook"
            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Upload File (TXT/PDF/JSON)</label>
          <div
            class="border-2 border-dashed border-slate-600 rounded-lg px-4 py-4 text-center hover:bg-slate-700/30 transition-colors">
            <input type="file" accept=".txt,.pdf,.json" (change)="onFileSelected($event)"
              class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-500/20 file:text-indigo-400 hover:file:bg-indigo-500/30 cursor-pointer">
          </div>
        </div>

        <div class="flex items-center">
          <div class="h-px bg-slate-700 flex-1"></div>
          <span class="px-3 text-xs text-slate-500 font-medium">OR</span>
          <div class="h-px bg-slate-700 flex-1"></div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Paste Text</label>
          <textarea [ngModel]="uploadText()" (ngModelChange)="uploadText.set($event)" rows="4"
            placeholder="Paste your text here..."
            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all resize-none"></textarea>
        </div>

        <button (click)="onUpload()" [disabled]="isUploading()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center disabled:opacity-50">
          <svg *ngIf="isUploading()" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          {{ isUploading() ? 'Processing...' : 'Upload & Process' }}
        </button>

        <p *ngIf="uploadStatus()" class="text-sm text-center text-teal-400 mt-2 font-medium">
          {{ uploadStatus() }}
        </p>
      </div>
    </div>

    <!-- QA Chat Section -->
    <div
      class="md:col-span-2 bg-slate-800/50 backdrop-blur-md rounded-2xl flex flex-col border border-slate-700 shadow-xl h-[85vh]">
      <div class="p-6 border-b border-slate-700">
        <h2 class="text-2xl font-semibold flex items-center text-indigo-400">
          <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
            </path>
          </svg>
          Ask the Context
        </h2>
        <p class="text-slate-400 text-sm mt-1">Queries are evaluated entirely locally using TF-IDF ranking.</p>
      </div>

      <!-- Chat Messages -->
      <div class="flex-1 overflow-y-auto p-6 space-y-6">

        <div *ngIf="chatHistory().length === 0" class="flex flex-col items-center justify-center h-full text-slate-500">
          <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
            </path>
          </svg>
          <p class="text-lg">No questions asked yet.</p>
          <p class="text-sm mt-1">Upload a document and start asking!</p>
        </div>

        <div *ngFor="let msg of chatHistory()" class="flex flex-col"
          [ngClass]="msg.role === 'user' ? 'items-end' : 'items-start'">
          <div class="max-w-[80%] rounded-2xl px-6 py-4 shadow-md"
            [ngClass]="msg.role === 'user' ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-slate-700/80 text-slate-100 rounded-bl-none'">
            <div class="prose prose-invert max-w-none whitespace-pre-wrap">
              {{ msg.content }}
            </div>

            <!-- Source References -->
            <div *ngIf="msg.sources && msg.sources.length > 0" class="mt-4 pt-3 border-t border-slate-600/50">
              <p class="text-xs text-slate-400 mb-2 uppercase tracking-wider font-semibold">Sources:</p>
              <div class="flex flex-wrap gap-2">
                <span *ngFor="let src of msg.sources"
                  class="text-xs bg-slate-900 px-2 py-1 rounded text-teal-400 border border-slate-700">
                  {{ src }}
                </span>
              </div>
            </div>
          </div>
        </div>

        <div *ngIf="isAsking()" class="flex items-start">
          <div class="bg-slate-700/50 text-slate-100 rounded-2xl rounded-bl-none px-6 py-4 flex space-x-2 items-center">
            <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
          </div>
        </div>

      </div>

      <!-- Input Bar -->
      <div class="p-4 bg-slate-900 border-t border-slate-700 rounded-b-2xl">
        <div
          class="flex items-center bg-slate-800 rounded-xl p-2 border border-slate-700 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 transition-all">
          <input type="text" [ngModel]="question()" (ngModelChange)="question.set($event)" (keyup.enter)="onAsk()"
            placeholder="Ask a question based on uploaded documents..."
            class="flex-1 bg-transparent px-4 py-2 text-slate-100 focus:outline-none placeholder-slate-500">
          <button (click)="onAsk()" [disabled]="isAsking() || !question().trim()"
            class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white p-2.5 rounded-lg transition-colors ml-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
